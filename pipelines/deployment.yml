$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json

name: android-permissions-deployment
endpoint_name: android-permissions-endpoint

model: azureml:android-permissions-model@latest

environment: 
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04
  conda_file: ../environment.yml

code_configuration:
  code: ../src
  scoring_script: score.py

instance_type: Standard_DS2_v2
instance_count: 1

request_settings:
  request_timeout_ms: 5000
  max_concurrent_requests_per_instance: 1

liveness_probe:
  initial_delay: 30
  period: 10
  timeout: 2
  success_threshold: 1
  failure_threshold: 3

readiness_probe:
  initial_delay: 10
  period: 10
  timeout: 2
  success_threshold: 1
  failure_threshold: 3